<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="chat-container">
            <div class="chat-header">
                <h5>AI Chat Assistant</h5>
            </div>

            <div class="chat-messages" id="chatMessages">
                <!-- Messages will be inserted here -->
            </div>

            <div class="chat-input">
                <form id="messageForm">
                    <div class="input-container">
                        <div class="model-selector" id="modelSelector">
                            <span>GPT-3.5 Turbo</span>
                            <i data-feather="chevron-down"></i>
                        </div>

                        <div class="input-group">
                            <input type="text" id="messageInput" placeholder="输入您的问题...">
                            <button type="submit">
                                <i data-feather="send"></i>
                            </button>
                        </div>

                        <div class="action-buttons">
                            <button type="button" class="action-button" id="screenshotBtn">
                                <i data-feather="camera"></i>
                                截图
                            </button>
                            <button type="button" class="action-button" id="settingsBtn">
                                <i data-feather="settings"></i>
                                设置
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="settings-panel" id="settingsPanel">
            <h6>设置</h6>
            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="darkMode">
                <label class="form-check-label" for="darkMode">深色模式</label>
            </div>
            <button id="clearHistory" class="btn btn-danger btn-sm mt-3">清除聊天记录</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script src="js/screenshot.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/popup.js"></script>
</body>
</html>
