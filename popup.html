<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Extension</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="chat-container">
            <div class="chat-header">
                <h5>Simple Chatbot</h5>
                <div class="header-buttons">
                    <button id="screenshotBtn" class="btn btn-sm btn-success me-2" title="Take Screenshot">
                        <i data-feather="camera"></i>
                    </button>
                    <button id="settingsBtn" class="btn btn-sm btn-light">
                        <i data-feather="settings"></i>
                    </button>
                </div>
            </div>

            <div class="chat-messages" id="chatMessages">
                <!-- Messages will be inserted here -->
            </div>

            <div class="chat-input">
                <form id="messageForm">
                    <div class="input-group">
                        <input type="text" id="messageInput" class="form-control" placeholder="Type your message...">
                        <button type="submit" class="btn btn-primary">
                            <i data-feather="send"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div class="settings-panel" id="settingsPanel">
            <h6>Settings</h6>
            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="darkMode">
                <label class="form-check-label" for="darkMode">Dark Mode</label>
            </div>
            <button id="clearHistory" class="btn btn-danger btn-sm mt-2">Clear Chat History</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script src="js/screenshot.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/popup.js"></script>
</body>
</html>
